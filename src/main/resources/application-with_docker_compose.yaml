server:
  port: 9090

spring:
  application:
    name: kbe-brewery-gateway

  docker:
    compose:
      enabled: true
      stop:
        command: down
      readiness:
        wait: always
        timeout: 4m
        tcp:
          connect-timeout: 2000ms
      skip:
        in-tests: false

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: beer-service
              uri: http://host.docker.internal:8080
              predicates:
                - Path=/api/v1/beer/*,/api/v1/beerUpc/*
            - id: inventory-service
              uri: http://host.docker.internal:8082
              predicates:
                - Path=/api/v1/beer/*/inventory
            - id: order-service
              uri: http://host.docker.internal:8081
              predicates:
                - Path=/api/v1/customers/** 

management:
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoints:
    access:
      default: unrestricted
    web:
      exposure:
        include: "*"
  endpoint:
    configprops:
      # WARNING: SECURITY RISK - DO NOT USE IN PRODUCTION ENVIRONMENT
      # This configuration exposes sensitive data and should only be used for development or testing purposes.
      # Ensure this is disabled in any environment where security is a concern.
      show-values: ALWAYS
    health:
      probes:
        enabled: true
      show-details: always
  info:
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    git:
      enabled: true
      mode: full
  httpexchanges:
    recording:
      enabled: true
      include: request_headers, response_headers, session_id, time_taken
  observations:
    annotations:
      enabled: true
    http:
      server:
        requests:
          name: http.server.requests
      client:
        requests:
          name: http-client-requests

  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    export:
      otlp:
        enabled: false
    sampling:
      probability: 1.0

  logging:
    export:
      enabled: false
      otlp:
        enabled: false
  simple:
    metrics:
      export:
        enabled: false